version: '3.8'

services:
  # Servicio de Base de Datos (MySQL)
  db:
    image: mysql:8.0
    container_name: sicolardb
    restart: always
    environment:
      MYSQL_DATABASE: sistemacontable
      MYSQL_ROOT_PASSWORD: "0101"
    ports:
      - "3306:3306"
    volumes:
      # Inicializa la base de datos con el SQL del proyecto
      - ./estrutura_system_contable.sql:/docker-entrypoint-initdb.d/estrutura_system_contable.sql
      - db_data:/var/lib/mysql

  # Servicio Web (PHP/Apache)
  web:
    build: .
    container_name: sicolar-web
    restart: always
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=0101
      - DB_NAME=sistemacontable
    depends_on:
      - db

volumes:
  db_data:
